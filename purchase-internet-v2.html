<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" href="favicon.ico" />
    <link rel="stylesheet" href="styles-bundle.css">
    <link rel="stylesheet" href="purchase-internet-v2.css">

    <title>Wifinity</title>

    <script src="purchase-internet-v2.js" defer></script>
    <script
      type="text/javascript"
      src="https://widget.trustpilot.com/bootstrap/v5/tp.widget.bootstrap.min.js"
      async>
    </script>
  </head>

  <body class="w-light-theme">
    <header>
      <div class="w-header">
        <div class="w-logo-container">
          <img src="img/wifinity_logo_black.png" alt="Wifinity Logo" class="w-logo">
        </div>
      </div>
    </header>

    <main>
      <div class="w-background-white">
        <div class="w-container">
          <div class="w-plan-selector">
            <div class="w-plan-selector__plans"></div>

            <div class="w-plan-summary">
              <div class="w-plan-summary__header">
                <div>
                  <div id="planName" class="w-plan-summary__plane-name">
                    Basic
                  </div>
                </div>
              </div>

              <div class="w-plan-details">
                <div class="w-plan-details__row">
                  <div class="w-plan-details__row-header">
                    <img
                      id="planSpeedIcon"
                      src="img/speed_basic_icon.svg"
                      alt="Speed Icon"
                      class="w-plan-details__icon"
                    >
                    <span>Speed</span>
                  </div>
  
                  <span class="w-plan-details__plan-metadata">
                    Up to
                    <span id="planSpeed">
                      30 mb/s
                    </span>
                  </span>
                </div>

                <div class="w-plan-details__row">
                  <div class="w-plan-details__row-header">
                    <img
                      id="planDevicesIcon"
                      src="img/devices_icon.svg"
                      alt="Devices Icon"
                      class="w-plan-details__icon"
                    >
                    <span>Devices</span>
                  </div>

                  <span
                    id="planDevices"
                    class="w-plan-details__plan-metadata"
                  >
                    2 Devices
                  </span>
                </div>
              </div>

              <div class="w-plan-price">
                <div class="w-plan-price__row w-plan-price__row--total">
                  <span></span>
                  <div>
                    <span id="totalPrice">£24.99</span><span class="w-plan-price__row-cycle">/month</span>
                  </div>
                </div>
              </div>

              <button class="w-plan-summary__button">
                Get connected
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <div class="w-footer-container">
        <div>
          <span class="w-footer__contact">Tel: +44 (0) 20 8090 1290</span>
          <span class="w-footer__contact">Email: support@wifinity.co.uk</span>
        </div>
        <p>©2026 Wifinity</p>
      </div>
    </footer>
  </body>
</html>
